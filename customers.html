<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>قائمة العملاء</title>
  <style>
    body { font-family: Arial; padding: 20px; direction: rtl; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
    th { background: #4CAF50; color: white; }
    #debug { background: #fff3cd; padding: 10px; margin: 10px 0;
              font-size: 12px; direction: ltr; word-break: break-all; }
  </style>
</head>
<body>

  <h2>👥 قائمة العملاء</h2>
  <div id="status">جاري الاتصال...</div>
  <div id="debug">في انتظار رد Manager...</div>
  <table>
    <thead>
      <tr>
        <th>اسم العميل</th>
        <th>الرصيد</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>

    // هذا هو عنوان Manager عندك — المفتاح الأساسي
    var MANAGER_ORIGIN = "http://192.168.0.10:5000";

    var msgCount = 0;

    window.addEventListener("message", function(event) {
      msgCount++;
      document.getElementById("debug").textContent =
        "رسالة #" + msgCount + 
        " | من: " + event.origin + 
        "\n" + JSON.stringify(event.data).substring(0, 500);

      var raw = event.data;
      var data = null;

      if (Array.isArray(raw)) {
        data = raw;
      } else if (raw && Array.isArray(raw.data)) {
        data = raw.data;
      } else if (raw && Array.isArray(raw.result)) {
        data = raw.result;
      } else if (raw && Array.isArray(raw.response)) {
        data = raw.response;
      }

      if (!data || data.length === 0) return;

      document.getElementById("status").textContent = 
        "✅ تم التحميل — " + data.length + " عميل";
      
      var tbody = document.getElementById("tbody");
      tbody.innerHTML = "";

      data.forEach(function(c) {
        var row = document.createElement("tr");
        var name = c.Name || c.name || c.CustomerName || "";
        var balance = c.Balance || c.balance || 0;
        row.innerHTML = "<td>" + name + "</td><td>" + balance + "</td>";
        tbody.appendChild(row);
      });
    });

    // إرسال الطلب بالصيغة الصحيحة مع تحديد origin المانجر
    window.parent.postMessage("/api4/customer-batch", MANAGER_ORIGIN);

    setTimeout(function() {
      window.parent.postMessage("/api4/customer-batch", "*");
    }, 1000);

    setTimeout(function() {
      window.parent.postMessage({ 
        type: "apiRequest",
        url: "/api4/customer-batch" 
      }, MANAGER_ORIGIN);
    }, 2000);

  </script>
</body>
</html>
