<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>فواتير البيع</title>
  <style>
    body{font-family:Arial;padding:20px;direction:rtl}
    table{width:100%;border-collapse:collapse}
    th,td{border:1px solid #ddd;padding:8px;text-align:right}
    th{background:#2196F3;color:white}
    #status{margin:10px 0;font-weight:bold}
  </style>
</head>
<body>
  <h2>&#x641;&#x648;&#x627;&#x62A;&#x64A;&#x631; &#x627;&#x644;&#x628;&#x64A;&#x639;</h2>
  <div id="status">Loading...</div>
  <table>
    <thead>
      <tr>
        <th>&#x631;&#x642;&#x645; &#x627;&#x644;&#x641;&#x627;&#x62A;&#x648;&#x631;&#x629;</th>
        <th>&#x627;&#x644;&#x639;&#x645;&#x64A;&#x644;</th>
        <th>&#x627;&#x644;&#x645;&#x628;&#x644;&#x63A;</th>
        <th>&#x627;&#x644;&#x62A;&#x627;&#x631;&#x64A;&#x62E;</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    function callApi(path) {
      return new Promise(function(resolve, reject) {
        var rid = crypto.randomUUID();
        var timer = setTimeout(function() {
          window.removeEventListener('message', h);
          reject(new Error('Timeout'));
        }, 15000);
        function h(e) {
          if (e.data && 
              typeof e.data.type === 'string' &&
              e.data.type.endsWith('-response') && 
              e.data.requestId === rid) {
            clearTimeout(timer);
            window.removeEventListener('message', h);
            resolve(e.data.body);
          }
        }
        window.addEventListener('message', h);
        window.parent.postMessage({
          type: 'api-request',
          method: 'GET',
          path: path,
          requestId: rid
        }, '*');
      });
    }

    callApi('/api4/sales-invoice-batch?PageSize=50')
    .then(function(data) {
      var items = [];
      if (Array.isArray(data)) items = data;
      else if (data && Array.isArray(data.items)) items = data.items;
      else if (data && Array.isArray(data.data)) items = data.data;

      if (items.length === 0) {
        document.getElementById('status').textContent = 
          'Debug: ' + JSON.stringify(data).substring(0, 150);
        return;
      }

      document.getElementById('status').textContent = 
        'تم تحميل ' + items.length + ' فاتورة';

      var tbody = document.getElementById('tbody');
      items.forEach(function(inv) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + (inv.Reference || inv.Number || '') + '</td>' +
          '<td>' + (inv.Customer || inv.CustomerName || '') + '</td>' +
          '<td>' + (inv.Total || inv.Amount || 0) + '</td>' +
          '<td>' + (inv.Date || '') + '</td>';
        tbody.appendChild(tr);
      });
    })
    .catch(function(err) {
      document.getElementById('status').textContent = 'Error: ' + err.message;
    });
  </script>
</body>
</html>
