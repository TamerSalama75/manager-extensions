<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{font-family:Arial;padding:20px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px;text-align:left}
th{background:#1d6fcf;color:white}
#status{margin:10px 0;font-weight:bold}
.btn{padding:8px 20px;background:#1d6fcf;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px}
</style>
</head>
<body>
<h2>Sales Invoices</h2>
<div id="status">Press Load</div>
<button class="btn" onclick="loadData()">Load</button>
<table>
<thead><tr><th>Reference</th><th>Date</th><th>Total</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
<script>
function loadData(){
  document.getElementById('status').textContent='Loading...';
  var rid=crypto.randomUUID();
  var timer=setTimeout(function(){
    window.removeEventListener('message',h);
    document.getElementById('status').textContent='Timeout';
  },15000);
  function h(e){
    if(e.source!==window.parent)return;
    if(!e.data||typeof e.data.type!=='string')return;
    if(!e.data.type.endsWith('-response'))return;
    if(e.data.requestId!==rid)return;
    clearTimeout(timer);
    window.removeEventListener('message',h);
    var body=e.data.body;
    var items=Array.isArray(body)?body:
              (body&&Array.isArray(body.items))?body.items:[];
    if(!items.length){
      document.getElementById('status').textContent=
        'No data. Raw: '+JSON.stringify(body).substring(0,100);
      return;
    }
    document.getElementById('status').textContent='Loaded '+items.length+' invoices';
    var tbody=document.getElementById('tbody');
    tbody.innerHTML='';
    items.forEach(function(inv){
      var item=inv.item||inv;
      var lines=item.lines||[];
      var total=0;
      lines.forEach(function(ln){total+=(ln.qty||1)*(ln.salesUnitPrice||0)-(ln.discountAmount||0);});
      var tr=document.createElement('tr');
      tr.innerHTML='<td>'+(item.reference||item.Reference||'')+'</td>'+
                   '<td>'+((item.issueDate||'').substring(0,10))+'</td>'+
                   '<td>'+total.toLocaleString(undefined,{minimumFractionDigits:2})+'</td>';
      tbody.appendChild(tr);
    });
  }
  window.addEventListener('message',h);
  window.parent.postMessage({type:'api-request',method:'GET',
    path:'/api4/sales-invoice-batch?PageSize=50',requestId:rid},'*');
}
</script>
</body>
</html>
