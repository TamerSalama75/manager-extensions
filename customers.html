<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>قائمة العملاء</title>
  <style>
    body { font-family: Arial; padding: 20px; direction: rtl; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
    th { background: #4CAF50; color: white; }
    #status { color: #666; margin-bottom: 10px; }
    #debug { background: #f5f5f5; padding: 10px; margin: 10px 0; 
              font-size: 12px; direction: ltr; display: none; }
  </style>
</head>
<body>

  <h2>👥 قائمة العملاء</h2>
  <div id="status">جاري التحميل...</div>
  <div id="debug"></div>
  <table>
    <thead>
      <tr>
        <th>اسم العميل</th>
        <th>الرصيد</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>

    var debug = document.getElementById("debug");
    debug.style.display = "block";

    // استقبل أي رسالة وسجّلها للفحص
    window.addEventListener("message", function(event) {
      debug.textContent = "رسالة وصلت: " + JSON.stringify(event.data).substring(0, 300);

      var raw = event.data;

      // Manager يرسل البيانات مباشرة كـ array أو object
      var data = null;

      if (Array.isArray(raw)) {
        data = raw;
      } else if (raw && Array.isArray(raw.data)) {
        data = raw.data;
      } else if (raw && Array.isArray(raw.result)) {
        data = raw.result;
      }

      if (!data) return;

      document.getElementById("status").textContent = "تم التحميل — " + data.length + " عميل";
      var tbody = document.getElementById("tbody");

      data.forEach(function(customer) {
        var row = document.createElement("tr");
        row.innerHTML =
          "<td>" + (customer.Name || customer.name || JSON.stringify(customer).substring(0,50)) + "</td>" +
          "<td>" + (customer.Balance || customer.balance || 0) + "</td>";
        tbody.appendChild(row);
      });
    });

    // جرب الصيغتين معاً
    window.parent.postMessage("/api4/customer-batch", "*");

    setTimeout(function() {
      window.parent.postMessage({ 
        requestType: "api", 
        url: "/api4/customer-batch" 
      }, "*");
    }, 1000);

  </script>
</body>
</html>
